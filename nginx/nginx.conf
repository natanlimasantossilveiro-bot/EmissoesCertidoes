# Config inicial — SÓ HTTP, sem certificado ainda. Serve o front estático
# (front/*.html) e encaminha as rotas da API pro container do Gateway.
# Depois que o certbot emitir o certificado (ver docs/DEPLOY_VPS.md),
# troque por nginx.ssl.conf.example (mesmo arquivo, mais o bloco HTTPS).
server {
    listen 80;
    server_name _;

    # Necessário pro certbot validar o domínio (desafio HTTP-01) antes de
    # emitir o certificado — não mexer nesse location.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Rotas da API — tudo que não é um arquivo estático do front vai pro
    # Gateway. Lista explícita (em vez de um catch-all) pra não acabar
    # proxiando por engano algo que devia ser servido como arquivo.
    location ~ ^/(auth|admin|portais|dlq|pedidos|lotes)(/|$) {
        proxy_pass http://gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
