# Config inicial — SÓ HTTP, sem certificado ainda. Serve o front estático
# (front/*.html) e encaminha as rotas da API pro container do Gateway.
# Depois que o certbot emitir o certificado (ver docs/DEPLOY_VPS.md),
# troque por nginx.ssl.conf.example (mesmo arquivo, mais o bloco HTTPS).
server {
    listen 80;
    server_name _;

    # ⚠️ Sem isso, o nginx resolve "gateway" pro IP do container só UMA
    # VEZ, na hora que ele próprio sobe, e guarda esse IP pra sempre —
    # cada vez que o container do gateway é recriado (ex: `docker compose
    # up --build gateway`), ele ganha um IP novo, e o nginx continua
    # tentando falar com o IP antigo (conexão recusada, aparece pro
    # usuário como "token inesperado '<'" — o nginx devolvendo a própria
    # página de erro em HTML em vez do JSON do gateway). Isso já aconteceu
    # várias vezes nesse projeto, sempre resolvido reiniciando o nginx na
    # mão. O `resolver` do Docker (`127.0.0.11`, DNS interno dele) +
    # `set` abaixo faz o nginx reconsultar esse endereço a cada 10s, em
    # vez de fixar pra sempre — não precisa mais reiniciar o nginx depois
    # de recriar o gateway.
    resolver 127.0.0.11 valid=10s;

    # Necessário pro certbot validar o domínio (desafio HTTP-01) antes de
    # emitir o certificado — não mexer nesse location.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Rotas da API — tudo que não é um arquivo estático do front vai pro
    # Gateway. Lista explícita (em vez de um catch-all) pra não acabar
    # proxiando por engano algo que devia ser servido como arquivo.
    location ~ ^/(auth|admin|portais|dlq|pedidos|lotes)(/|$) {
        set $upstream_gateway http://gateway:8000;
        proxy_pass $upstream_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
