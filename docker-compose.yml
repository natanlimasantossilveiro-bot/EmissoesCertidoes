version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"   # protocolo AMQP
      - "127.0.0.1:15672:15672" # painel web (usuário/senha padrão: guest/guest)
    volumes:
      # Sem isso, filas e mensagens na DLQ somem toda vez que o container
      # reinicia — inaceitável em produção (é justamente a DLQ que guarda
      # os pedidos que falharam e precisam de inspeção manual).
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: certidoes
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/certidoes
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_SENHA_INICIAL: ${ADMIN_SENHA_INICIAL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy

  worker-receita-federal:
    build:
      context: .
      dockerfile: services/worker-receita-federal/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/certidoes
      BROWSER_HEADLESS: "true"
      BROWSER_DOWNLOAD_DIR: /data/downloads
      STORAGE_LOCAL_PATH: /data/evidencias
    volumes:
      - worker_rf_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    # Pra ter mais throughput, suba mais réplicas:
    # docker compose up --scale worker-receita-federal=3
    deploy:
      replicas: 1

  worker-cpf:
    build:
      context: .
      dockerfile: services/worker-cpf/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/certidoes
      BROWSER_HEADLESS: "true"
      BROWSER_DOWNLOAD_DIR: /data/downloads
      STORAGE_LOCAL_PATH: /data/evidencias
      TWOCAPTCHA_API_KEY: ${TWOCAPTCHA_API_KEY}
    volumes:
      - worker_cpf_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    deploy:
