      BROWSER_DOWNLOAD_DIR: /data/downloads
      STORAGE_LOCAL_PATH: /data/evidencias
      TWOCAPTCHA_API_KEY: ${TWOCAPTCHA_API_KEY}
    volumes:
      - worker_cpf_data:/data
    depends_on:
      rabbitmq:
