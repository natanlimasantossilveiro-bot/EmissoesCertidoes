version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"   # protocolo AMQP
      - "127.0.0.1:15672:15672" # painel web (usuário/senha padrão: guest/guest)
    volumes:
      # Sem isso, filas e mensagens na DLQ somem toda vez que o container
      # reinicia — inaceitável em produção (é justamente a DLQ que guarda
      # os pedidos que falharam e precisam de inspeção manual).
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: certidoes
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/certidoes
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_SENHA_INICIAL: ${ADMIN_SENHA_INICIAL}
    volumes:
      # Cada worker grava certidão/evidência no próprio volume, isolado —
      # sem isso o Gateway não teria como servir o download desses
      # arquivos pro front. Só leitura: o Gateway nunca escreve aqui.
      - worker_rf_data:/dados-workers/receita_federal:ro
      - worker_cpf_data:/dados-workers/cpf_situacao_cadastral:ro
      - worker_cnpj_qsa_data:/dados-workers/cnpj_qsa:ro
      - worker_tst_cndt_data:/dados-workers/tst_cndt:ro
      - worker_trf4_data:/dados-workers/trf4_certidao_civel_criminal:ro
      - worker_curitiba_imovel_data:/dados-workers/curitiba_certidao_cadastro_imovel:ro
      - worker_curitiba_debitos_data:/dados-workers/curitiba_consulta_debitos_divida_ativa:ro
      - worker_sefaz_pr_data:/dados-workers/sefaz_pr_certidao_debitos:ro
      - worker_atendenet_pinhais_data:/dados-workers/atendenet_pinhais_cnd:ro
      - worker_fgts_caixa_data:/dados-workers/fgts_caixa:ro
      - worker_mpf_certidao_data:/dados-workers/mpf_certidao_negativa:ro
      - worker_curitiba_cnd_cpf_data:/dados-workers/curitiba_cnd_cpf:ro
      - worker_curitiba_tributos_imovel_data:/dados-workers/curitiba_certidao_tributos_imovel:ro
      - worker_trt9_certidao_data:/dados-workers/trt9_certidao_trabalhista:ro
      - worker_mpt_certidao_data:/dados-workers/mpt_certidao_negativa:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy

  worker-receita-federal:
    build:
      context: .
      dockerfile: services/worker-receita-federal/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/certidoes
      BROWSER_HEADLESS: "true"
      BROWSER_DOWNLOAD_DIR: /data/downloads
      STORAGE_LOCAL_PATH: /data/evidencias
    volumes:
      - worker_rf_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    # Pra ter mais throughput, suba mais réplicas:
    # docker compose up --scale worker-receita-federal=3
    deploy:
      replicas: 1

  worker-cpf:
